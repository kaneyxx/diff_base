# Kontext Full Fine-tune Configuration
# Use for FLUX.1 Kontext (paired image-editing) with full transformer fine-tuning.

training:
  method: "kontext_finetune"

  # Guidance scale for dev variant (ignored for schnell)
  guidance_scale: 3.5

  # Optimizer
  optimizer:
    type: "adamw"
    lr: 5.0e-6
    betas: [0.9, 0.999]
    weight_decay: 0.01
    eps: 1.0e-8

  # Learning Rate Scheduler
  lr_scheduler:
    type: "cosine"
    warmup_steps: 500
    min_lr_ratio: 0.1

  # Loss
  loss:
    type: "mse"

  # Training Settings
  batch_size: 1
  gradient_accumulation: 8
  epochs: 20
  max_grad_norm: 1.0
  save_every_n_epochs: 2
  learning_rate: 5.0e-6
