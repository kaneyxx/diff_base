# Kontext LoRA Training Configuration
# Use for FLUX.1 Kontext (paired image-editing) with LoRA fine-tuning.

training:
  method: "kontext_lora"

  # LoRA Parameters
  lora:
    rank: 16
    alpha: 16
    dropout: 0.0
    target_modules:
      - "to_q"
      - "to_k"
      - "to_v"
      - "to_out.0"
      - "proj_mlp"
      - "proj_out"
    train_text_encoder: false

  # Guidance scale for dev variant (ignored for schnell)
  guidance_scale: 3.5

  # Optimizer
  # LR is NOT set here. The canonical LR source is training.learning_rate
  # from the experiment yaml; lora_trainer.py uses optimizer.lr only as an
  # explicit per-experiment override (set optimizer.lr in your experiment yaml
  # to override training.learning_rate for that run).
  optimizer:
    type: "adamw"
    betas: [0.9, 0.999]
    weight_decay: 0.01
    eps: 1.0e-8

  # Learning Rate Scheduler
  lr_scheduler:
    type: "cosine"
    warmup_steps: 200
    min_lr_ratio: 0.1

  # Text embedding cache
  # Enable when captions repeat frequently (e.g. ORION fixed per-biomarker captions).
  # With 100% hit rate, T5-XXL + CLIP-L (~22 GB) need never be invoked again after
  # the first pass, allowing them to be offloaded from GPU.
  # Default: false (safe for variable-caption datasets).
  cache_text_embeddings: false

  # Loss
  loss:
    type: "mse"

  # Training Settings
  batch_size: 2
  gradient_accumulation: 4
  epochs: 50
  max_grad_norm: 1.0
  save_every_n_epochs: 5
  learning_rate: 1.0e-4
