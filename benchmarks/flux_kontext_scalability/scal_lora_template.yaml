# LoRA scalability-sweep template. Variables filled in by train_wrapper.sh
# from env (LORA_RANK, LORA_ALPHA, BATCH_SIZE, MAX_STEPS, OUT_DIR, EXP_NAME).
# Rank / alpha can be varied across sweep iterations to map throughput vs
# trainable-param scale across 1/2/4 GPU configurations.
#
# Set REPO_ROOT, MODEL_HUB_ROOT, DATA_ROOT in the calling environment before
# launching (see train_wrapper.sh and submit_scal_sweep.sh).
_base_:
  - ${REPO_ROOT}/configs/models/flux1_kontext.yaml
  - ${REPO_ROOT}/configs/training/kontext_lora.yaml

experiment:
  name: "__EXP_NAME__"
  output_dir: "__OUT_DIR__"
  seed: 42

model:
  dtype: "bfloat16"
  pretrained_path: "${MODEL_HUB_ROOT}/hub/models--black-forest-labs--FLUX.1-Kontext-dev/snapshots/24e9dedc4ef646698dc8eb4e18ae2cec3c9fea0d"
  # cpu_offload=true with cache_text_embeddings=true: T5/CLIP run on CPU exactly
  # ONCE per unique caption (corpora with a fixed prompt per class encode text
  # only N_classes times for the entire training run). Net effect: zero T5/CLIP
  # GPU residency, ~22 GB GPU saved vs naive bf16 GPU-resident T5.
  text_encoder:
    cpu_offload: true

training:
  method: "kontext_lora"
  epochs: 1
  max_steps: __MAX_STEPS__
  batch_size: __BATCH_SIZE__
  # Pure throughput measurement — 1 forward+backward = 1 step. Effective batch
  # size scales linearly with GPU count via DDP, NOT via accumulation.
  gradient_accumulation: 1
  learning_rate: 1.0e-4
  max_grad_norm: 1.0

  lora:
    rank: __LORA_RANK__
    alpha: __LORA_ALPHA__
    train_text_encoder: false

  guidance_scale: 3.5

  # Text embedding cache: when the corpus has one fixed caption per class,
  # cache hit rate is 100% after the first sample.
  cache_text_embeddings: true

data:
  dataset_type: "orion"
  train_path: "${DATA_ROOT}/data"
  train_split_path: "${DATA_ROOT}/dataset/training_splits/CD45_train.json"
  biomarker: "CD45"
  target_resolution: 512
  reference_resolution: 512
  resolution: 512
  num_workers: 4

hardware:
  mixed_precision: "bf16"
  # Required: bs=4 LoRA r16 with the text encoder on GPU OOMed at ~77 GB on
  # an A100 80 GB. Gradient checkpointing trades ~10-15% throughput for ~30%
  # activation-memory reduction; cleaner than dropping batch size for the
  # multi-GPU scaling story.
  gradient_checkpointing: true
  compile: false

logging:
  wandb:
    enabled: false
  tensorboard:
    enabled: false
